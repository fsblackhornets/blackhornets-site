<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" sizes="32x32" href="/frontend/assets/images/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/frontend/assets/images/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/frontend/assets/images/apple-touch-icon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <meta name="description" content="Meet the talented team members of Black Hornets Racing - A Formula Student Team">
    <meta name="theme-color" content="#000000">
    <title>Our Team - Black Hornets Racing</title>
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Black Hornets Racing">
    <meta property="og:title" content="Our Team - Black Hornets Racing">
    <meta property="og:description" content="Meet the talented engineers, designers and innovators behind Black Hornets Racing - Formula Student team from Novi Sad.">
    <meta property="og:url" content="https://fsblackhornets.org.rs/frontend/pages/team/team.html">
    <meta property="og:image" content="https://fsblackhornets.org.rs/frontend/assets/images/favicon-512x512.png">
    <link rel="canonical" href="https://fsblackhornets.org.rs/frontend/pages/team/team.html">
    <!-- Preload Critical Resources -->
    <link rel="preload" href="/frontend/assets/js/header-footer.js?v=1.4.0" as="script">
    <link rel="preload" href="/frontend/pages/team/teams.css" as="style">
    
    <!-- Preconnect to External Resources -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Michroma&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- CSS -->
    <link rel="stylesheet" href="/frontend/components/header/navbar.css">
    <link rel="stylesheet" href="/frontend/assets/css/style.css?v=1.2">
    <link rel="stylesheet" href="/frontend/components/footer/footer.css">
    <link rel="stylesheet" href="/frontend/pages/team/teams.css">
</head>
<body>
    <!-- Loading Overlay -->
    <div class="loading-overlay">
        <div class="loading-spinner"></div>
    </div>

    <!-- Header -->
    <header></header>

    <!-- Hero Section -->
    <section class="hero">
            <div class="overlay"></div>
     

        <div class="hero-content">
            <h1 id="team-hero-title">Our Team</h1>
            <p id="team-hero-subtitle">Meet the innovators behind Black Hornets Racing.</p>
        </div>
    </section>

    <!-- Leadership Hierarchy Section -->
    <section class="leadership-hierarchy">
        <div class="container">
            <h2 class="section-title" id="team-leadership-title">Team Leadership</h2>
            
            <div class="hierarchy-box">
            </div>
        </div>
    </section>

    <!-- Team Members Section -->
    <section class="team-members-section">
        <div class="org-structure">
            <!-- Departments -->
            <div class="departments">
                <div class="department-box operating-business" data-department="operating_business">
                    <h3 id="dept-business-ops">Business Team</h3>
                    <div class="sub-departments">
                        <span id="dept-marketing">Marketing</span>
                        <span id="dept-sponsorships">Sponsorships</span>
                        <span id="dept-management">Management</span>
                    </div>
                    <button type="button" class="see-team-btn" id="see-team-btn-3">See Team Members</button>
                </div>

                <div class="department-box mechanical" data-department="mechanical">
                    <h3 id="dept-mechanical">Mechanical Engineering</h3>
                    <div class="sub-departments">
                        <span id="dept-chassis-aero">Chassis and Aerodynamics</span>
                        <span id="dept-suspension-steering">Suspension and Steering</span>
                        <span id="dept-transmission-braking">Transmission and Braking</span>
                    </div>
                    <button type="button" class="see-team-btn" id="see-team-btn-1">See Team Members</button>
                </div>

                <div class="department-box electrical" data-department="electrical">
                    <h3 id="dept-electrical">Electrical Engineering</h3>
                    <div class="sub-departments">
                        <span id="dept-high-voltage">High Voltage</span>
                        <span id="dept-low-voltage">Low Voltage</span>
                    </div>
                    <button type="button" class="see-team-btn" id="see-team-btn-2">See Team Members</button>
                </div>
            </div>
        </div>

        <!-- Department Members View -->
        <div class="department-members-view" style="display: none;">
            <div class="back-container">
                <button type="button" class="back-btn">
                    <i class="fas fa-arrow-left"></i>
                    <span id="back-to-teams">Back to Teams</span>
                </button>
            </div>
            <div class="members-grid"></div>
        </div>
    </section>

    <!-- Member Detail Modal -->
    <div id="memberModal" class="member-modal">
        <div class="modal-content">
            <button type="button" class="close-modal"><i class="fas fa-times"></i></button>
            <div class="modal-body">
                <div class="modal-image-section">
                    <img id="modalMemberImage" src="" alt="Member">
                </div>
                <div class="modal-info-section">
                    <h2 id="modalMemberName"></h2>
                    <p id="modalMemberPosition" class="modal-position"></p>
                    <div class="modal-details">
                        <p id="modalMemberDepartment"><i class="fas fa-sitemap"></i> <span></span></p>
                        <p id="modalMemberFaculty"><i class="fas fa-university"></i> <span></span></p>
                        <p id="modalMemberStudy"><i class="fas fa-graduation-cap"></i> <span></span></p>
                        <p id="modalMemberYear"><i class="fas fa-calendar-alt"></i> <span></span></p>
                        <p id="modalMemberEmail"><i class="fas fa-envelope"></i> <span></span></p>
                    </div>
                    <div class="modal-motivation" id="modalMemberMotivation"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer></footer>

    <!-- Scripts -->
    <script src="/frontend/assets/js/header-footer.js?v=1.5.0"></script>
    <script src="/frontend/assets/js/teams.js?v=1.8" defer></script>

    <script>
        window.addEventListener('load', () => {
            const loadingOverlay = document.querySelector('.loading-overlay');
            if (loadingOverlay) {
                loadingOverlay.style.opacity = '0';
                setTimeout(() => loadingOverlay.style.display = 'none', 300);
            }
        });
    </script>
</body>
</html>
